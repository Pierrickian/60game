<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>60game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #11121a;
        color: #f5f5f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        padding: 32px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.5rem, 10vw, 5rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.78);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>60game</h1>
      <p>Base web prête pour un jeu de cartes évolutif, IA-first, déployable sur GitHub Pages et Vercel.</p>
    </main>
  </body>
</html>
